version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: docker_configs/backend.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker_configs/frontend.Dockerfile
    ports:
      - "8501:8501"
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:8000
    restart: unless-stopped

  sandbox:
    build:
      context: .
      dockerfile: docker_configs/sandbox.Dockerfile
    network_mode: none
    restart: "no"
