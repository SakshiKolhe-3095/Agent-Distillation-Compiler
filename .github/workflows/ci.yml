name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install CPU-only deps for CI (no GPU on runners)
        run: |
          pip install pytest requests docker python-dotenv groq google-generativeai
      - name: Build sandbox Docker image
        run: |
          docker build -t adc-sandbox:latest -f docker_configs/sandbox.Dockerfile .
      - name: Run agent unit tests
        run: |
          pytest tests/ -v